kind = "web"
previewPath = "/"
title = "Wizardry AI"
version = "1.0.0"
id = "artifacts/wizardry-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19077

[services.development]
run = "pnpm --filter @workspace/wizardry-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/wizardry-ai", "run", "build" ]
publicDir = "artifacts/wizardry-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19077"
BASE_PATH = "/"
